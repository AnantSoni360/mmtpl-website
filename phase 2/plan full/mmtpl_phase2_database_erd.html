
<style>
#erd-wrap svg { max-width: 100%; }
#erd-wrap svg.erDiagram .divider path { stroke-opacity: 0.4; }
#erd-wrap svg.erDiagram .row-rect-odd path,
#erd-wrap svg.erDiagram .row-rect-odd rect,
#erd-wrap svg.erDiagram .row-rect-even path,
#erd-wrap svg.erDiagram .row-rect-even rect { stroke: none !important; }
</style>
<div id="erd-wrap" style="overflow-x:auto;padding:0.5rem 0"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#1a1a2e' : '#E6F1FB',
    primaryBorderColor: dark ? '#378ADD' : '#185FA5',
    primaryTextColor: dark ? '#c2c0b6' : '#0C447C',
    secondaryColor: dark ? '#1a2e1a' : '#E1F5EE',
    tertiaryColor: dark ? '#2e1a1a' : '#FAEEDA',
  },
});
const diagram = `erDiagram
  USER {
    cuid id PK
    string name
    string email
    string password_hash
    enum role
    boolean is_active
    datetime created_at
  }
  EMPLOYEE {
    cuid id PK
    cuid user_id FK
    string employee_code
    string department
    string designation
    string phone
    string location
    date join_date
    enum employment_type
  }
  CLIENT {
    cuid id PK
    cuid user_id FK
    string company_name
    string gstin
    string address
    string contact_person
  }
  PROJECT {
    cuid id PK
    cuid client_id FK
    string project_code
    string name
    string location
    string scope
    decimal value_cr
    date start_date
    date end_date
    enum status
    enum category
  }
  PROJECT_ASSIGNMENT {
    cuid id PK
    cuid project_id FK
    cuid employee_id FK
    string role_on_project
    date assigned_from
    date assigned_to
  }
  TASK {
    cuid id PK
    cuid project_id FK
    cuid assigned_to FK
    cuid created_by FK
    string title
    text description
    enum priority
    enum status
    date due_date
  }
  ATTENDANCE {
    cuid id PK
    cuid employee_id FK
    date date
    time check_in
    time check_out
    enum status
    string remarks
  }
  LEAVE_REQUEST {
    cuid id PK
    cuid employee_id FK
    cuid approved_by FK
    date from_date
    date to_date
    enum leave_type
    text reason
    enum status
  }
  INQUIRY {
    cuid id PK
    cuid assigned_to FK
    string name
    string company
    string email
    string phone
    string service
    text message
    enum status
    datetime created_at
  }
  INVOICE {
    cuid id PK
    cuid project_id FK
    cuid client_id FK
    string invoice_number
    decimal amount
    date due_date
    enum status
  }
  PROJECT_UPDATE {
    cuid id PK
    cuid project_id FK
    cuid posted_by FK
    string title
    text content
    string photo_url
    datetime created_at
  }
  DOCUMENT {
    cuid id PK
    cuid project_id FK
    cuid uploaded_by FK
    string name
    string file_url
    enum doc_type
    datetime uploaded_at
  }
  MESSAGE {
    cuid id PK
    cuid from_user FK
    cuid to_user FK
    cuid project_id FK
    text content
    boolean is_read
    datetime sent_at
  }
  JOB_POSTING {
    cuid id PK
    string title
    string department
    string location
    enum job_type
    string experience
    text description
    boolean is_active
    datetime created_at
  }
  JOB_APPLICATION {
    cuid id PK
    cuid job_posting_id FK
    string name
    string email
    string phone
    string resume_url
    enum status
    datetime applied_at
  }
  NOTIFICATION {
    cuid id PK
    cuid user_id FK
    string title
    text body
    boolean is_read
    string link
    datetime created_at
  }
  USER ||--o| EMPLOYEE : "has profile"
  USER ||--o| CLIENT : "has profile"
  CLIENT ||--o{ PROJECT : "owns"
  PROJECT ||--o{ PROJECT_ASSIGNMENT : "assigns"
  EMPLOYEE ||--o{ PROJECT_ASSIGNMENT : "works on"
  PROJECT ||--o{ TASK : "has"
  EMPLOYEE ||--o{ TASK : "assigned to"
  EMPLOYEE ||--o{ ATTENDANCE : "records"
  EMPLOYEE ||--o{ LEAVE_REQUEST : "submits"
  PROJECT ||--o{ INVOICE : "billed via"
  CLIENT ||--o{ INVOICE : "receives"
  PROJECT ||--o{ PROJECT_UPDATE : "has"
  PROJECT ||--o{ DOCUMENT : "stores"
  JOB_POSTING ||--o{ JOB_APPLICATION : "receives"
  USER ||--o{ NOTIFICATION : "gets"
`;
const { svg } = await mermaid.render('erd-diagram', diagram);
document.getElementById('erd-wrap').innerHTML = svg;
document.querySelectorAll('#erd-wrap svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill','stroke','stroke-width','class','style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd-wrap svg.erDiagram .row-rect-odd path, #erd-wrap svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke','none');
});
</script>
